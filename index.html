<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <!-- Removido 'viewport-fit=cover' para que o Safari do iPhone não esconda a tela atrás do Notch e do botão Home -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atendimento VIP - Fluxo Vital</title>

    <style>
        /* Regra de Ouro absoluta para evitar cortes no celular: usar 100% em vez de vw/vh */
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* 100% da área visível do navegador (se o teclado subir, encolhe perfeitamente) */
            overflow: hidden;
            /* Bloqueia qualquer rolagem fantasma que empurre a tela para baixo */
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            /* Se for iOS, não deixa a tela ser esticada igual elástico */
            overscroll-behavior: none;
        }

        /* O Chatbot vai usar exatamente o espaço dado pelo 'body' */
        typebot-standard {
            width: 100%;
            height: 100%;
            /* Nunca use 100vh aqui, esse era o erro fatal! */
            display: block;
        }

        /* Camada de carregamento profissional intocada */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f4f6;
            border-top: 4px solid #14b8a6;
            /* Cor Teal oficial */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            margin-top: 20px;
            color: #64748b;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <!-- Ecrã de Carregamento -->
    <div class="loading-screen" id="loader">
        <div class="spinner"></div>
        <div class="loading-text">A iniciar conversa segura...</div>
    </div>

    <!-- Container original do Typebot -->
    <typebot-standard></typebot-standard>

    <!-- Script de Inicialização Oficial do Typebot -->
    <script type="module">
        import Typebot from 'https://cdn.jsdelivr.net/npm/@typebot.io/js@0/dist/web.js';

        // Inicialização exata do funil: Servidor chat.chatecom.me
        Typebot.initStandard({
            typebot: "lipedema-sem-complica-es-de76edd",
            apiHost: "https://chat.chatecom.me",
        });

        // Transição suave para o Loader
        window.onload = () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.remove(), 500);
                }
            }, 3000);
        };
    </script>

</body>

</html>
